<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">OL icon palette board</title>
  <desc id="desc">An OL monogram palette board for current Oload brand work.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9f0e5" />
      <stop offset="100%" stop-color="#eadccd" />
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ffe1b6" /><stop offset="100%" stop-color="#b05d25" /></linearGradient>
    <linearGradient id="letter" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f5bb74" /><stop offset="100%" stop-color="#7d3c19" /></linearGradient>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)" />
  <text x="72" y="86" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="700" fill="#4a3629">OL icon palette board</text>
  <text x="72" y="124" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#705847">Current brand direction for shipped Oload surfaces.</text>

  <rect x="70" y="180" width="1060" height="500" rx="30" fill="rgba(255,255,255,0.54)" stroke="rgba(90,58,38,0.14)" />
  <circle cx="350" cy="430" r="150" fill="url(#ring)" />
  <circle cx="350" cy="430" r="76" fill="#fff8ee" />
  <path d="M340 286a150 150 0 0 1 120 64" fill="none" stroke="#fff5e2" stroke-width="20" stroke-linecap="round" opacity="0.72" />
  <path d="M380 320h44v120h74v42H380z" fill="url(#letter)" />
  <circle cx="350" cy="430" r="150" fill="none" stroke="#6f3714" stroke-width="7" opacity="0.46" />

  <text x="610" y="314" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#4a3629">Core notes</text>
  <text x="610" y="366" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#705847">Rounded O ring with the L integrated into the right side.</text>
  <text x="610" y="404" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#705847">Warm copper and cream finish for strong small-size recognition.</text>
  <text x="610" y="442" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#705847">Use theme accents without changing the silhouette.</text>
</svg>
