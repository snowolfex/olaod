<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860" role="img" aria-labelledby="title desc">
  <title id="title">OL icon theme board</title>
  <desc id="desc">A richer OL monogram board showing light, tech, and dark finishes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f9f0e5" /><stop offset="100%" stop-color="#eadccd" /></linearGradient>
    <linearGradient id="ringLight" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ffe1b6" /><stop offset="100%" stop-color="#b05d25" /></linearGradient>
    <linearGradient id="letterLight" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f5bb74" /><stop offset="100%" stop-color="#7d3c19" /></linearGradient>
    <linearGradient id="ringTech" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ffd49c" /><stop offset="100%" stop-color="#bd672c" /></linearGradient>
    <linearGradient id="letterTech" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffe3ad" /><stop offset="100%" stop-color="#87411a" /></linearGradient>
    <linearGradient id="ringDark" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f6ca92" /><stop offset="100%" stop-color="#b35b28" /></linearGradient>
    <linearGradient id="letterDark" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#efaa61" /><stop offset="100%" stop-color="#7a3418" /></linearGradient>
  </defs>
  <rect width="1400" height="860" fill="url(#bg)" />
  <text x="72" y="88" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700" fill="#4a3629">OL icon theme board</text>
  <text x="72" y="126" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#705847">Current Oload mark system for light, tech, and dark surfaces.</text>

  <g transform="translate(88 190)">
    <rect width="360" height="540" rx="32" fill="rgba(255,255,255,0.54)" stroke="rgba(90,58,38,0.14)" />
    <circle cx="180" cy="212" r="118" fill="url(#ringLight)" />
    <circle cx="180" cy="212" r="60" fill="#fff8ee" />
    <path d="M171 96a118 118 0 0 1 95 51" fill="none" stroke="#fff5e2" stroke-width="16" stroke-linecap="round" opacity="0.72" />
    <path d="M204 126h34v96h60v34h-94z" fill="url(#letterLight)" />
    <circle cx="180" cy="212" r="118" fill="none" stroke="#6f3714" stroke-width="6" opacity="0.46" />
    <text x="36" y="420" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#4a3629">Light</text>
    <text x="36" y="462" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#705847">Warm and editorial.</text>
  </g>

  <g transform="translate(520 190)">
    <rect width="360" height="540" rx="32" fill="#122335" stroke="rgba(133,230,246,0.24)" />
    <circle cx="180" cy="212" r="118" fill="url(#ringTech)" />
    <circle cx="180" cy="212" r="60" fill="#effcff" />
    <path d="M171 96a118 118 0 0 1 95 51" fill="none" stroke="#ddfbff" stroke-width="16" stroke-linecap="round" opacity="0.78" />
    <path d="M204 126h34v96h60v34h-94z" fill="url(#letterTech)" />
    <circle cx="180" cy="212" r="118" fill="none" stroke="#8be8f5" stroke-width="6" opacity="0.72" />
    <text x="36" y="420" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">Tech</text>
    <text x="36" y="462" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#c7d6df">Cool signal edge.</text>
  </g>

  <g transform="translate(952 190)">
    <rect width="360" height="540" rx="32" fill="#21191d" stroke="rgba(255,255,255,0.12)" />
    <circle cx="180" cy="212" r="118" fill="url(#ringDark)" />
    <circle cx="180" cy="212" r="60" fill="#231c1a" />
    <path d="M171 96a118 118 0 0 1 95 51" fill="none" stroke="#ffe8ce" stroke-width="16" stroke-linecap="round" opacity="0.72" />
    <path d="M204 126h34v96h60v34h-94z" fill="url(#letterDark)" />
    <circle cx="180" cy="212" r="118" fill="none" stroke="#f2dfcb" stroke-width="6" opacity="0.5" />
    <text x="36" y="420" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">Dark</text>
    <text x="36" y="462" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#d8cbc1">Midnight depth, same mark.</text>
  </g>
