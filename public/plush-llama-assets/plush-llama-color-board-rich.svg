<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860" role="img" aria-label="Plush llama premium color board">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5ede0"/>
      <stop offset="100%" stop-color="#eadccd"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#7b624d" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1400" height="860" fill="url(#bg)"/>

  <text x="72" y="84" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="700" fill="#4a3629">Plush Llama Premium Color Board</text>
  <text x="72" y="122" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#705847">Warmer neutrals, deeper contrast, and richer accents for a premium plush mascot.</text>

  <g filter="url(#shadow)">
    <rect x="72" y="170" width="390" height="270" rx="30" fill="#fff9f2"/>
    <text x="104" y="216" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#4a3629">Premium Cream</text>
    <text x="104" y="246" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#786252">Elegant, soft, and safest for branding.</text>
    <rect x="104" y="284" width="72" height="118" rx="22" fill="#F2E3CF"/>
    <rect x="192" y="284" width="72" height="118" rx="22" fill="#D6BC9A"/>
    <rect x="280" y="284" width="72" height="118" rx="22" fill="#6A4A38"/>
    <rect x="368" y="284" width="54" height="118" rx="22" fill="#557F7A"/>
    <text x="104" y="422" font-family="Consolas, monospace" font-size="14" fill="#786252">#F2E3CF  #D6BC9A  #6A4A38  #557F7A</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="505" y="170" width="390" height="270" rx="30" fill="#fff9f2"/>
    <text x="537" y="216" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#4a3629">Soft Caramel</text>
    <text x="537" y="246" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#786252">Slightly sweeter, still plush and premium.</text>
    <rect x="537" y="284" width="72" height="118" rx="22" fill="#F5EEE4"/>
    <rect x="625" y="284" width="72" height="118" rx="22" fill="#C9A07C"/>
    <rect x="713" y="284" width="72" height="118" rx="22" fill="#704E3F"/>
    <rect x="801" y="284" width="54" height="118" rx="22" fill="#7699A7"/>
    <text x="537" y="422" font-family="Consolas, monospace" font-size="14" fill="#786252">#F5EEE4  #C9A07C  #704E3F  #7699A7</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="938" y="170" width="390" height="270" rx="30" fill="#fff9f2"/>
    <text x="970" y="216" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#4a3629">Mocha Moss</text>
    <text x="970" y="246" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#786252">Earthier and a bit more boutique.</text>
    <rect x="970" y="284" width="72" height="118" rx="22" fill="#CDB198"/>
    <rect x="1058" y="284" width="72" height="118" rx="22" fill="#EFE1D0"/>
    <rect x="1146" y="284" width="72" height="118" rx="22" fill="#5B453A"/>
    <rect x="1234" y="284" width="54" height="118" rx="22" fill="#6F7F62"/>
    <text x="970" y="422" font-family="Consolas, monospace" font-size="14" fill="#786252">#CDB198  #EFE1D0  #5B453A  #6F7F62</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="72" y="500" width="1256" height="284" rx="30" fill="#fff9f2"/>
    <text x="108" y="552" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#4a3629">Chosen stack</text>
    <text x="108" y="588" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#705847">Use Premium Cream unless a warmer or earthier tone is needed for a specific scene.</text>

    <circle cx="232" cy="676" r="58" fill="#F2E3CF"/>
    <circle cx="362" cy="676" r="58" fill="#D6BC9A"/>
    <circle cx="492" cy="676" r="58" fill="#6A4A38"/>
    <circle cx="622" cy="676" r="58" fill="#241A16"/>
    <circle cx="752" cy="676" r="58" fill="#557F7A"/>

    <text x="176" y="756" font-family="Consolas, monospace" font-size="16" fill="#705847">wool</text>
    <text x="302" y="756" font-family="Consolas, monospace" font-size="16" fill="#705847">face</text>
    <text x="434" y="756" font-family="Consolas, monospace" font-size="16" fill="#705847">nose</text>
    <text x="563" y="756" font-family="Consolas, monospace" font-size="16" fill="#705847">eyes</text>
    <text x="684" y="756" font-family="Consolas, monospace" font-size="16" fill="#705847">accent</text>

    <text x="904" y="610" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#4a3629">Do not drift into</text>
    <text x="904" y="646" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#705847">pink body tones</text>
    <text x="904" y="676" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#705847">hard plastic reflections</text>
    <text x="904" y="706" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#705847">hyper-real animal fur</text>
    <text x="904" y="736" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#705847">thin or angular face shapes</text>
  </g>
</svg>