<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="960" viewBox="0 0 1440 960" role="img" aria-labelledby="title desc">
  <title id="title">OL icon color board</title>
  <desc id="desc">A color board showing the OL monogram in light, tech, and dark finishes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9f0e5" />
      <stop offset="100%" stop-color="#eadccd" />
    </linearGradient>
    <linearGradient id="ringLight" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ffe1b6" /><stop offset="100%" stop-color="#b05d25" /></linearGradient>
    <linearGradient id="letterLight" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f5bb74" /><stop offset="100%" stop-color="#7d3c19" /></linearGradient>
    <linearGradient id="ringTech" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ffd49c" /><stop offset="100%" stop-color="#bd672c" /></linearGradient>
    <linearGradient id="letterTech" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffe3ad" /><stop offset="100%" stop-color="#87411a" /></linearGradient>
    <linearGradient id="ringDark" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f6ca92" /><stop offset="100%" stop-color="#b35b28" /></linearGradient>
    <linearGradient id="letterDark" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#efaa61" /><stop offset="100%" stop-color="#7a3418" /></linearGradient>
  </defs>
  <rect width="1440" height="960" fill="url(#bg)" />
  <text x="96" y="112" fill="#2d2018" font-family="Georgia, Trebuchet MS, sans-serif" font-size="64" font-weight="700">OL icon color board</text>
  <text x="96" y="164" fill="#6d5b50" font-family="Georgia, Trebuchet MS, sans-serif" font-size="28">The older mascot art is replaced by the shipped OL monogram system.</text>

  <g transform="translate(120 250)">
    <rect width="360" height="500" rx="34" fill="rgba(255,255,255,0.54)" stroke="rgba(90,58,38,0.14)" />
    <circle cx="180" cy="190" r="116" fill="url(#ringLight)" />
    <circle cx="180" cy="190" r="58" fill="#fff8ee" />
    <path d="M173 80a116 116 0 0 1 93 50" fill="none" stroke="#fff5e2" stroke-width="16" stroke-linecap="round" opacity="0.72" />
    <path d="M204 106h34v94h58v34h-92z" fill="url(#letterLight)" />
    <circle cx="180" cy="190" r="116" fill="none" stroke="#6f3714" stroke-width="6" opacity="0.46" />
    <text x="38" y="404" fill="#2d2018" font-family="Georgia, Trebuchet MS, sans-serif" font-size="36" font-weight="700">Light</text>
    <text x="38" y="446" fill="#6d5b50" font-family="Georgia, Trebuchet MS, sans-serif" font-size="22">Warm copper and cream.</text>
  </g>

  <g transform="translate(540 250)">
    <rect width="360" height="500" rx="34" fill="#122335" stroke="rgba(133,230,246,0.24)" />
    <circle cx="180" cy="190" r="116" fill="url(#ringTech)" />
    <circle cx="180" cy="190" r="58" fill="#effcff" />
    <path d="M173 80a116 116 0 0 1 93 50" fill="none" stroke="#ddfbff" stroke-width="16" stroke-linecap="round" opacity="0.78" />
    <path d="M204 106h34v94h58v34h-92z" fill="url(#letterTech)" />
    <circle cx="180" cy="190" r="116" fill="none" stroke="#8be8f5" stroke-width="6" opacity="0.72" />
    <text x="38" y="404" fill="#ffffff" font-family="Georgia, Trebuchet MS, sans-serif" font-size="36" font-weight="700">Tech</text>
    <text x="38" y="446" fill="#c7d6df" font-family="Georgia, Trebuchet MS, sans-serif" font-size="22">Cool signal edge, same geometry.</text>
  </g>

  <g transform="translate(960 250)">
    <rect width="360" height="500" rx="34" fill="#21191d" stroke="rgba(255,255,255,0.12)" />
    <circle cx="180" cy="190" r="116" fill="url(#ringDark)" />
    <circle cx="180" cy="190" r="58" fill="#231c1a" />
    <path d="M173 80a116 116 0 0 1 93 50" fill="none" stroke="#ffe8ce" stroke-width="16" stroke-linecap="round" opacity="0.72" />
    <path d="M204 106h34v94h58v34h-92z" fill="url(#letterDark)" />
    <circle cx="180" cy="190" r="116" fill="none" stroke="#f2dfcb" stroke-width="6" opacity="0.5" />
    <text x="38" y="404" fill="#ffffff" font-family="Georgia, Trebuchet MS, sans-serif" font-size="36" font-weight="700">Dark</text>
    <text x="38" y="446" fill="#d8cbc1" font-family="Georgia, Trebuchet MS, sans-serif" font-size="22">Midnight field, same mark.</text>
  </g>
</svg>
